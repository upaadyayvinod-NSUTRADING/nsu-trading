                color: #065f46;

            }

            .back-btn {
                display: inline-block;
                margin: 20px 40px;
                background: #065f46;
                color: white;
                padding: 8px 20px;
                border-radius: 30px;
                text-decoration: none;
                font-weight: bold;
                cursor: pointer;
                border: none;
                font-size: 1rem;
            }

            .back-btn:hover {
                background: #0a7a5a;
            }

            .detail-container {
                max-width: 800px;
                margin: 40px auto;
                padding: 30px;
                background: white;
                border-radius: 8px;
                box-shadow: 0 5px 15px rgba(0,0,0,0.1);

            .detail-container h2 {
                color: #065f46;
                text-align: center;
                margin-top: 0;
            }

            .detail-container img {
                max-width: 100%;
                max-height: 300px;
                object-fit: contain;
                display: block;
                margin: 20px auto;
            }

            .detail-description {
                line-height: 1.6;
                margin: 20px 0;
            }

            .detail-description h3, .detail-description h4 {
                color: #065f46;
            }

            .detail-description ul {
                padding-left: 20px;
            }

            .detail-features {
                background: #f0f7f0;
                padding: 20px;
                border-radius: 8px;
            }

            .detail-features h3 {
                color: #065f46;
                margin-top: 0;
            }

            .detail-features ul {
                padding-left: 20px;
                margin-bottom: 0;
            }

            .detail-features li {

            }

            .contact {
                background: white;
                padding: 60px 40px;

            .contact h2 {

                color: #065f46;

            .google-form-container {

                margin: 0 auto;
                border-radius: 8px;
                overflow: hidden;

                width: 100%;

                display: block;

            .social-links {

            .social-links a {

                text-decoration: none;

                text-align: center;

        // ---------- PRODUCT DESCRIPTIONS (unchanged) ----------
        const productDetails = {
            // ========== METAL & MINERALS ==========
            "Copper / Copper scrap / copper cathodes": `
                <p><strong>Copper cathodes</strong> are sheets of pure copper (typically 99.9%+) produced by electrolytic refining. They are the primary raw material for producing copper rods, wires, tubes and other products.</p>
                <p><strong>Copper scrap</strong> includes various recycled copper grades such as birch, berry, and candy. It is used in smelting and refining to produce new copper products.</p>
                <p><strong>Copper granules</strong> are small, granulated particles of copper, often used in sandblasting, as an additive in concrete, or for further processing.</p>
            `,
            "Aluminium / Aluminum scrap / ingots": `
                <p><strong>Aluminium scrap</strong> consists of recycled aluminium from various sources – grades include tense, zorba, and twitch. It is melted down to produce secondary aluminium.</p>
                <p><strong>Aluminium ingots</strong> are cast blocks of pure aluminium or aluminium alloys (e.g., ADC12, A380). They are remelted for die‑casting, automotive parts, and construction components.</p>
            `,
            "Brass / Brass scrap": `

            `,
            "Stainless steel / Stainless steel scrap": `
                <p><strong>Stainless steel scrap</strong> consists of discarded stainless steel items, sorted by grade (304, 316, 430). It is recycled in electric arc furnaces to produce new stainless steel.</p>
            `,

                <p><strong>Iron ore</strong> is a natural mineral from which metallic iron is extracted. It is available as fines (small particles) and lumps (larger pieces). The main raw material for steel production.</p>

            `,
            "Manganese ore": `
                <p><strong>Manganese ore</strong> is a natural mineral containing manganese in various oxides. It is essential for producing ferromanganese and silico‑manganese alloys used in steelmaking.</p>
            `,
            "Zinc scrap": `
                <p><strong>Zinc scrap</strong> includes recycled zinc from dross, ash, die‑cast parts, and old sheets. It is melted and refined for galvanising, brass production, and zinc alloys.</p>
            `,
            "Lead scrap": `
                <p><strong>Lead scrap</strong> consists of used lead products such as battery plates, lead sheathing, and lead dross. It is recycled to produce refined lead for new batteries and other applications.</p>
            `,
            "Ferro alloys": `
                <p><strong>Ferro alloys</strong> are alloys of iron with other elements (e.g., silicon, manganese, chromium). They are added to molten steel to impart specific properties like hardness or corrosion resistance.</p>
            `,
            "Metal powder": `
                <p><strong>Metal powders</strong> are finely divided metal particles (copper, aluminium, iron, etc.). They are used in powder metallurgy, additive manufacturing, chemical catalysts, and pyrotechnics.</p>
            `,

                <p><strong>Industrial minerals</strong> are rocks and minerals of economic value other than metal ores. This category includes quartz, feldspar, limestone, mica, sandstone, marble, granite and many others. They are used in construction, ceramics, glassmaking, and various manufacturing industries.</p>
            `,

            // ========== FOOD & AGRICULTURE ==========
            "Rice (Basmati / Non-Basmati)": `
                <p><strong>Basmati rice</strong> is a long‑grain aromatic rice grown in the Indian subcontinent. <strong>Non‑Basmati rice</strong> includes varieties like IR64, Swarna, and Ponni. Rice is a staple food for a large part of the world.</p>
            `,
            "Pulses (Toor, Chana, Moong and others.)": `
                <p><strong>Pulses</strong> are edible seeds of leguminous plants. <strong>Toor</strong> (pigeon pea), <strong>Chana</strong> (chickpea), <strong>Moong</strong> (green gram) are common Indian pulses, rich in protein and used in various dishes.</p>
            `,
            "Fresh fruits (Banana, Mango, Orange Pomegranate and others)": `
                <p><strong>Fresh fruits</strong> include bananas, mangoes, oranges, pomegranates, and seasonal varieties. They are consumed fresh or used in juices, desserts, and processed foods.</p>
            `,
            "Vegetables (Onion, Green chilli, Okra, Drumstick, Yam and others)": `
                <p><strong>Fresh vegetables</strong> such as onions, green chillies, okra, drumstick, yam, and others. They are essential ingredients in daily cooking worldwide.</p>
            `,
            "Coconuts": `
                <p><strong>Coconuts</strong> are the fruit of the coconut palm. Products include:</p>
                <ul>
                    <li><strong>Edible copra:</strong> dried coconut kernel, used in food and as a snack.</li>
                    <li><strong>Milling copra:</strong> dried pieces used for coconut oil extraction.</li>
                    <li><strong>Ball copra:</strong> whole dried kernel, also edible.</li>
                    <li><strong>Tender coconuts:</strong> young green coconuts with refreshing water and soft flesh.</li>
                </ul>
            `,
            "Oil seeds (Sesame, Groundnut)": `
                <p><strong>Oil seeds</strong> are seeds grown primarily for oil extraction. <strong>Sesame seeds</strong> come in natural (brown) and hulled (white) forms. <strong>Groundnuts</strong> (peanuts) are available in shell or as kernels. Both are also consumed directly or used in food products.</p>
            `,
            "Animal feed (Maize)": `
                <p><strong>Maize</strong> (corn) is a cereal grain widely used as animal feed, particularly for poultry and cattle. It provides energy and nutrients in feed formulations.</p>
            `,
            "Organic Jaggery": `
                <p><strong>Jaggery</strong> is a traditional non‑centrifugal cane sugar consumed in Asia and Africa. It is made by concentrating sugarcane juice and is available in blocks, cubes, or powder form.</p>
            `,
            "Dehydrated products": `
                <p><strong>Dehydrated products</strong> are fruits, vegetables, or herbs that have been dried to remove moisture, extending shelf life. Examples include dehydrated onion, garlic, tomato, and mango.</p>
            `,

                <p><strong>Brass items</strong> are products made from brass, an alloy of copper and zinc. They include lamps, idols, dinner sets, and decorative pieces, often polished or engraved.</p>
            `,
            "Copper decor": `
                <p><strong>Copper decor</strong> refers to decorative items made from copper, such as vessels, wall art, and showpieces. Copper is valued for its appearance and antimicrobial properties.</p>

            "Handwoven textiles": `
                <p><strong>Handwoven textiles</strong> are fabrics produced on a handloom, using cotton, silk, wool, or blends. They include sarees, scarves, and dress materials with traditional patterns.</p>

            "Home decor items": `

            "Marble artifacts": `

            `,
            "Bamboo products": `
                <p><strong>Bamboo products</strong> are made from bamboo, a fast‑growing grass. Items include baskets, furniture, window blinds, kitchenware, and garden accessories.</p>
            `,

            `,
            "Clay pottery": `

            "Carpets and Rugs": `

            `,

            `,

            "Turmeric / Lakadong turmeric": `
                <p><strong>Turmeric</strong> is a rhizome used as a spice, colouring agent, and in traditional medicine. It is available as whole fingers or ground powder. <strong>Lakadong turmeric</strong> is a variety from Meghalaya known for its high curcumin content.</p>
            `,
            "Red chili": `
                <p><strong>Red chillies</strong> are dried fruits of chili pepper plants. They come in various varieties (Byadagi, Guntur, Kashmiri) differing in pungency and colour. Used whole or ground.</p>
            `,
            "Black pepper": `
                <p><strong>Black pepper</strong> is a spice made from dried, unripe berries of the pepper plant. It is valued for its pungent flavour and is available whole or ground.</p>
            `,
            "Cumin seeds": `
                <p><strong>Cumin seeds</strong> are the dried seeds of the Cuminum cyminum plant. They have a warm, earthy flavour and are used whole or ground in many cuisines.</p>
            `,
            "Coriander seeds": `
                <p><strong>Coriander seeds</strong> are the dried seeds of the coriander plant (cilantro). They have a mild, citrusy flavour and are used whole or ground as a spice.</p>
            `,
            "Cardamom": `
                <p><strong>Cardamom</strong> is a spice made from the seeds of plants in the ginger family. Two main types: green (small) cardamom and black (large) cardamom. Used in sweet and savoury dishes.</p>
            `,
            "Cloves": `
                <p><strong>Cloves</strong> are the aromatic dried flower buds of the clove tree. They have a strong, pungent flavour and are used whole or ground in cooking and beverages.</p>
            `,
            "Cinnamon": `
                <p><strong>Cinnamon</strong> is a spice obtained from the inner bark of several tree species. True cinnamon (Ceylon) has a delicate flavour; cassia is stronger. Used in sweet and savoury dishes.</p>
            `,
            "Mustard seeds": `
                <p><strong>Mustard seeds</strong> are the small round seeds of various mustard plants. Brown, yellow, and black varieties are used as a spice in cooking and for oil extraction.</p>
            `,
            "Spice powders": `
                <p><strong>Spice powders</strong> are single spices ground into powder form, such as turmeric powder, chilli powder, coriander powder, and cumin powder.</p>
            `,
            "Spice blends (garam masala)": `
                <p><strong>Spice blends</strong> are mixtures of ground spices. <strong>Garam masala</strong> is a popular North Indian blend containing cardamom, cinnamon, cloves, cumin, and other spices.</p>
            `,

            // ========== AYURVEDIC PRODUCTS ==========
            "Ashwagandha root / Ashwagandha powder": `
                <p><strong>Ashwagandha</strong> (Withania somnifera) is a medicinal herb used in Ayurveda. The roots are dried and used whole or ground into powder. It is traditionally used as a tonic and adaptogen.</p>
            `,
            "Moringa powder": `
                <p><strong>Moringa powder</strong> is made by drying and grinding the leaves of the Moringa oleifera tree. It is rich in nutrients and used as a dietary supplement.</p>
            `,
            "Tulsi (holy basil)": `
                <p><strong>Tulsi</strong> (Ocimum tenuiflorum), or holy basil, is an aromatic plant revered in Ayurveda. The leaves are dried and used for teas and herbal preparations.</p>
            `,
            "Neem leaves / powder": `
                <p><strong>Neem</strong> (Azadirachta indica) is a tree whose leaves, bark, and oil are used in traditional medicine. Dried neem leaves and powder are used in skincare and herbal remedies.</p>
            `,
            "Amla (Indian Gooseberry)": `
                <p><strong>Amla</strong> (Phyllanthus emblica), or Indian gooseberry, is a fruit rich in vitamin C. It is consumed fresh, dried, or powdered, and used in Ayurvedic formulations.</p>
            `,
            "Essential oils": `
                <p><strong>Essential oils</strong> are concentrated hydrophobic liquids containing volatile aroma compounds from plants. Examples include lemongrass, eucalyptus, peppermint, and sandalwood oils. Used in aromatherapy, cosmetics, and flavouring.</p>
            `,
            "Herbal cosmetics (soap, oil, cream)": `
                <p><strong>Herbal cosmetics</strong> are personal care products made with plant‑based ingredients. This category includes herbal soaps, hair oils, face creams, and scrubs formulated with traditional herbs.</p>
            `,
            "Herbal health products": `
                <p><strong>Herbal health products</strong> encompass dietary supplements and wellness formulations based on herbs. Examples include chyawanprash (a herbal jam), triphala (a three‑fruit formula), herbal teas, and wellness capsules.</p>
            `
        };

        // ---------- RENDER CATEGORY CARDS (unchanged) ----------
        function renderCategories() {
            const grid = document.getElementById('categoryGrid');
            grid.innerHTML = '';
            categories.forEach(cat => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => showProducts(cat.name);
                card.innerHTML = `
                    <img src="${cat.image}" alt="${cat.name}" onerror="this.src='https://via.placeholder.com/300x200?text=${encodeURIComponent(cat.name)}'">
                    <h3>${cat.name}</h3>
                `;
                grid.appendChild(card);
            });
        }

        // ---------- SHOW PRODUCTS (unchanged) ----------
        function showProducts(categoryName) {
            const category = categories.find(c => c.name === categoryName);
            if (!category) return;

            document.getElementById('hero').style.display = 'none';
            document.getElementById('categorySection').style.display = 'none';
            document.getElementById('productSection').style.display = 'block';
            document.getElementById('detailSection').style.display = 'none';

            document.getElementById('categoryTitle').textContent = category.name;

            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';

            category.products.forEach(prod => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => showDetail(prod);
                card.innerHTML = `
                    <img src="${getProductImage(prod)}" alt="${prod}" onerror="this.src='https://via.placeholder.com/300x200?text=${encodeURIComponent(prod)}'">
                    <h3>${prod}</h3>
                `;
                grid.appendChild(card);
            });
        }

        // ---------- SHOW DETAIL VIEW (unchanged) ----------
        function showDetail(productName) {
            document.getElementById('productSection').style.display = 'none';
            document.getElementById('detailSection').style.display = 'block';

            document.getElementById('detailTitle').textContent = productName;
            document.getElementById('detailImage').src = getProductImage(productName);

            const descriptionHTML = productDetails[productName] || `<p>${productName}</p>`;
            document.getElementById('detailDescription').innerHTML = descriptionHTML;

            const features = [
                "Export grade product",
                "Sourced from reliable suppliers",
                "Competitive pricing",
                "Timely delivery"
            ];
            const list = document.getElementById('detailFeatures');
            list.innerHTML = '';
            features.forEach(f => {
                const li = document.createElement('li');
                li.textContent = f;
                list.appendChild(li);
            });
        }

        function backToProducts() {
            document.getElementById('detailSection').style.display = 'none';
            document.getElementById('productSection').style.display = 'block';
        }

        function showHome() {
            document.getElementById('hero').style.display = 'block';
            document.getElementById('categorySection').style.display = 'block';
            document.getElementById('productSection').style.display = 'none';
            document.getElementById('detailSection').style.display = 'none';
        }

        // ---------- INITIALISE ----------
        renderCategories();
        showHome();
    </script>

    </body>
    </html>
